# Deploy Handwerker Software auf Hetzner Server
# Trigger: Push auf main oder manuell

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prüfe Deploy-Secrets
        run: |
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then
            echo "::error::DEPLOY_HOST fehlt. Bitte in Settings → Secrets and variables → Actions anlegen."
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then
            echo "::error::DEPLOY_USER fehlt."
            exit 1
          fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then
            echo "::error::DEPLOY_SSH_KEY fehlt."
            exit 1
          fi
          echo "✓ Alle Secrets sind gesetzt"

      - name: SSH-Key vorbereiten
        run: |
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > deploy_key
          chmod 644 deploy_key

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key_path: deploy_key
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH || '/opt/handwerker-software' }}
            git fetch origin main
            git reset --hard origin/main
            docker compose build --no-cache
            docker compose run --rm app npx prisma db push
            docker compose up -d --force-recreate
            docker image prune -f
