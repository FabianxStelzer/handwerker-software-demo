# Nginx-Konfiguration für einblick.handwerkvoran.de (mit SSL)
# Nach Certbot: SSL-Zertifikat wird automatisch eingebunden

server {
    listen 80;
    server_name einblick.handwerkvoran.de;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name einblick.handwerkvoran.de;

    ssl_certificate /etc/letsencrypt/live/einblick.handwerkvoran.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/einblick.handwerkvoran.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
