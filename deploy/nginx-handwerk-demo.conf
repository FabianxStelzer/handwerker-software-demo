# Nginx-Konfiguration für einblick.handwerkvoran.de
# Platzieren unter: /etc/nginx/sites-available/handwerk-demo
# Aktivieren: ln -s /etc/nginx/sites-available/handwerk-demo /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name einblick.handwerkvoran.de;

    # Let's Encrypt ACME-Challenge für Certbot
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
